name: build-images

# Build and publish container images for OSCAR-owned components.
#
# - On push to `main` and tags `v*`: builds + pushes to GHCR.
# - On pull requests touching image sources: builds without pushing,
#   so the Dockerfile is validated before merge.
#
# Matrix entries are deliberately permissive: each step checks that the
# Dockerfile actually exists before building, so this workflow can land
# on main before the image-bearing PRs do without breaking subsequent
# pushes.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'gatekeeper/**'
      - 'connectors/**'
      - 'shared/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - 'gatekeeper/**'
      - 'connectors/**'
      - 'shared/**'
      - '.github/workflows/build-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: oscar-gatekeeper
            dockerfile: gatekeeper/Dockerfile
            description: "OSCAR voice-pipeline orchestrator — Wyoming server that drives Whisper/Piper and hands off conversation to Hermes."
          - image: oscar-connector-weather
            dockerfile: connectors/weather/Dockerfile
            description: "OSCAR weather connector — OpenWeatherMap-backed MCP server (current weather + 5-day forecast)."
          - image: oscar-connector-cloud-llm
            dockerfile: connectors/cloud-llm/Dockerfile
            description: "OSCAR cloud-LLM connector — per-request escalation to Anthropic Claude or Google Gemini, writes to cloud_audit."
          - image: oscar-db-migrate
            dockerfile: shared/oscar_db/Dockerfile
            description: "OSCAR DB migrate sidecar — runs alembic upgrade head against the oscar-brain Postgres on pod start."
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.dockerfile }} not present on this ref; skipping ${{ matrix.image }} build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build (and push on main/tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
