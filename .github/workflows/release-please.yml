name: release-please

# Maintains a "release PR" against main with the version bump + CHANGELOG
# entry computed from conventional-commit messages. Merging that PR
# creates a Git tag (e.g. v0.1.0) which in turn triggers build-images.yml
# to push the corresponding image tags to GHCR.
#
# Conventional-commit prefixes that move versions:
#   feat:     -> minor bump
#   fix:      -> patch bump
#   feat!:    -> breaking change, major bump (until v1.0.0: minor bump)
# Other types (chore, docs, refactor, ci, build, perf, test) are recorded
# in the changelog but don't bump the version.
#
# After release-please opens or updates the release PR, we enable
# GitHub's native auto-merge on it. The PR sits idle until the required
# CI checks (tests, build-images, pre-commit) all pass, then GitHub
# squashes it in without human intervention. The resulting tag fires
# build-images.yml on the v* trigger and the cycle closes.
#
# Pre-requisites:
#
# 1. Settings → General → Pull Requests → "Allow auto-merge" is enabled
#    at the repo level (set once via
#      gh api -X PATCH /repos/<owner>/<repo> -F allow_auto_merge=true).
#
# 2. A `RELEASE_PLEASE_TOKEN` secret with a fine-grained PAT scoped to
#    `contents: write` + `pull_requests: write` on this repo. Without
#    it the action uses GITHUB_TOKEN, which has a known issue creating
#    GitHub Release objects (Resource not accessible by integration on
#    POST /repos/<owner>/<repo>/releases — even with contents:write
#    declared on the workflow). See the chronic failure on PR #49.
#    Setup:
#      - github.com → Settings → Developer settings → Personal access
#        tokens → Fine-grained tokens → Generate new
#      - Scope: Only select repositories → mdopp/oscar
#      - Repository permissions: Contents (Read+Write),
#        Pull requests (Read+Write), Workflows (Read+Write — only
#        needed if release-please should ever edit workflow files)
#      - Add to mdopp/oscar → Settings → Secrets and variables →
#        Actions as `RELEASE_PLEASE_TOKEN`.
#    Workflow falls back to GITHUB_TOKEN if the secret is absent so
#    nothing blows up on a fresh clone — just don't expect release
#    creation to land.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Prefer the PAT (see header for why); fall back to GITHUB_TOKEN
          # so the workflow doesn't error on a fresh-clone setup where the
          # secret isn't configured yet.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge on the release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `outputs.pr` is the JSON of the opened/updated release PR (or empty
          # when there's nothing to release this push).
          PR_NUMBER=$(jq -r '.number' <<< '${{ steps.release.outputs.pr }}')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "::notice::release-please produced no PR number; nothing to auto-merge"
            exit 0
          fi
          echo "Enabling auto-merge (squash) on PR #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch
