apiVersion: v1
kind: Pod
metadata:
  name: oscar-brain
  labels:
    app: oscar-brain
  annotations:
    servicebay.label: "OSCAR Brain (HERMES + Ollama + Qdrant + Postgres)"
    servicebay.schema-version: "1"
    servicebay.ports: "{{HERMES_PORT}}/tcp,{{OLLAMA_PORT}}/tcp,{{QDRANT_PORT}}/tcp"
spec:
  containers:
  # 1. HERMES — agent core. Loads OSCAR skills, talks to Ollama, Postgres, Qdrant,
  #    and (via MCP) to ServiceBay-MCP, HA-MCP, and the oscar-connectors pod.
  #    Skills under skills/<name>/ inside the registry import `oscar_logging`
  #    from the mounted shared package.
  - name: hermes
    image: ghcr.io/nousresearch/hermes-agent:latest
    env:
    - name: OLLAMA_BASE_URL
      value: "http://localhost:{{OLLAMA_PORT}}"
    - name: HERMES_MODEL
      value: "{{HERMES_MODEL}}"
    - name: HERMES_ROUTER_MODEL
      value: "{{ROUTER_MODEL}}"
    - name: POSTGRES_DSN
      value: "postgresql://oscar:{{POSTGRES_PASSWORD}}@localhost:5432/oscar"
    - name: QDRANT_URL
      value: "http://localhost:{{QDRANT_PORT}}"
    - name: HA_MCP_URL
      value: "{{HA_MCP_URL}}"
    - name: HA_MCP_TOKEN
      value: "{{HA_MCP_TOKEN}}"
    - name: SERVICEBAY_MCP_URL
      value: "{{SERVICEBAY_MCP_URL}}"
    - name: SERVICEBAY_MCP_TOKEN
      value: "{{SERVICEBAY_MCP_TOKEN}}"
    # Cloud-LLM credentials. Only populated in the `cloud` deployment mode
    # (OLLAMA_ENABLED=""). With a cloud HERMES_MODEL like
    # `anthropic/claude-sonnet-4` HERMES routes everything through the
    # provider; with a local model these are ignored. We expose the same
    # key under three names so HERMES picks it up regardless of whether
    # it reads its own `HERMES_API_KEY` variable or the provider-SDK
    # standard env vars (`GOOGLE_API_KEY`, `ANTHROPIC_API_KEY`). One key
    # in the wizard → both code paths covered.
    - name: HERMES_API_KEY
      value: "{{HERMES_API_KEY}}"
    - name: GOOGLE_API_KEY
      value: "{{HERMES_API_KEY}}"
    - name: ANTHROPIC_API_KEY
      value: "{{HERMES_API_KEY}}"
    # Signal gateway (Phase 1). HERMES talks to a signal-cli daemon
    # running as a sidecar in this pod; the daemon manages the linked-
    # device session state in /home/.local/share/signal-cli.
    - name: SIGNAL_HTTP_URL
      value: "http://127.0.0.1:8080"
    - name: SIGNAL_ACCOUNT
      value: "{{SIGNAL_ACCOUNT}}"
    - name: OSCAR_COMPONENT
      value: "hermes"
    # Phase-0 default: debug mode on. Flip via the debug.set admin skill once
    # OSCAR moves to productive use (Phase 2/3).
    - name: OSCAR_DEBUG_MODE
      value: "true"
    # Make OSCAR's shared Python packages importable inside the HERMES
    # container so skills can use them without an image rebuild. Each
    # entry points at the src/ directory of a shared-library project.
    - name: PYTHONPATH
      value: "/opt/oscar/shared/oscar_logging/src:/opt/oscar/shared/oscar_time_jobs/src:/opt/oscar/shared/oscar_audit/src:/opt/oscar/shared/oscar_health/src:/opt/oscar/shared/oscar_help/src:/opt/oscar/shared/oscar_skill_runs/src:/opt/oscar/shared/oscar_skill_author/src:/opt/oscar/shared/oscar_skill_reviewer/src:${PYTHONPATH}"
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 8000
      hostPort: {{HERMES_PORT}}
    volumeMounts:
    - mountPath: /root/.hermes
      name: hermes-data
    - mountPath: /opt/oscar/shared
      name: oscar-shared
      readOnly: true
    - mountPath: /opt/oscar/skills
      name: oscar-skills
      readOnly: true
    # Local writable overrides layer — user-initiated edits and reviewer-
    # applied auto-merges land here. `oscar_help` reads both mounts and
    # lets entries here shadow same-named public-repo skills.
    - mountPath: /opt/oscar/skills-local
      name: oscar-skills-local

  # 1a. skills-local-init — runs once on pod start. If the writable
  #     skills-local hostPath doesn't have a `.git` yet, init one with
  #     a baseline commit so future user/reviewer edits accumulate a
  #     real local history (used by `oscar-skill-revert` later).
  #     Pod-init semantics aren't standard in non-K8s Pod runtimes — we
  #     model it as a fast-exit container that just runs `git init` and
  #     then sleeps; safe to restart, idempotent.
  - name: skills-local-init
    image: docker.io/alpine/git:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -eu
        DIR=/opt/oscar/skills-local
        cd "$DIR"
        if [ ! -d .git ]; then
          echo "skills-local-init: initialising local skills git history"
          git init -q .
          git config user.email "oscar@localhost"
          git config user.name "OSCAR"
          # Mark the dir as safe — hostPath UID may not match git's owner check.
          git config --global --add safe.directory "$DIR"
          touch .gitkeep
          git add -A
          git commit -q -m "baseline: empty skills-local store"
        else
          echo "skills-local-init: .git already present, leaving alone"
        fi
        # Stay alive so the pod stays in 'running' state. Re-runs on pod restart.
        exec sleep infinity
    volumeMounts:
    - mountPath: /opt/oscar/skills-local
      name: oscar-skills-local
    env:
    - name: OSCAR_COMPONENT
      value: "skills-local-init"
    - name: TZ
      value: "{{TZ}}"

  # 1b. signal-cli daemon — Phase-1 sidecar so HERMES's Signal gateway has
  #     an HTTP endpoint to talk to. Linked-device session state lives in
  #     /home/.local/share/signal-cli (persistent volume below). First-time
  #     pairing happens once at deploy via the README's QR-scan flow.
  - name: signal-cli-daemon
    image: docker.io/bbernhard/signal-cli-rest-api:latest
    env:
    - name: MODE
      value: "json-rpc"
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 8080
    volumeMounts:
    - mountPath: /home/.local/share/signal-cli
      name: signal-cli-data

  {{#OLLAMA_ENABLED}}
  # 2. Ollama — local LLM runtime. GPU passthrough is a separate toggle
  #    (`GPU_PASSTHROUGH`) so this same container can also run CPU-only
  #    when no GPU is present. Pulls `{{HERMES_MODEL}}` and
  #    `{{ROUTER_MODEL}}` on first start.
  #    Omitted entirely in the `cloud` deployment mode (OLLAMA_ENABLED="").
  - name: ollama
    image: docker.io/ollama/ollama:latest
    env:
    - name: OLLAMA_HOST
      value: "0.0.0.0:11434"
    - name: OLLAMA_KEEP_ALIVE
      value: "24h"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "2"
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 11434
      hostPort: {{OLLAMA_PORT}}
    volumeMounts:
    - mountPath: /root/.ollama
      name: ollama-models
    {{#GPU_PASSTHROUGH}}
    resources:
      limits:
        nvidia.com/gpu: "1"
    {{/GPU_PASSTHROUGH}}
  {{/OLLAMA_ENABLED}}

  # 3. Qdrant — vector store for OSCAR domain memory (semantic index over
  #    domain collections in Phase 3a+; empty in Phase 0).
  - name: qdrant
    image: docker.io/qdrant/qdrant:latest
    env:
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 6333
      hostPort: {{QDRANT_PORT}}
    volumeMounts:
    - mountPath: /qdrant/storage
      name: qdrant-data

  # 4. Postgres — OSCAR domain tables + system_settings + cloud_audit.
  #    Schema is owned by the oscar-db-migrate container (alembic, runs at
  #    pod start). This container just runs the stock postgres entrypoint.
  - name: postgres
    image: docker.io/postgres:16-alpine
    env:
    - name: POSTGRES_USER
      value: "oscar"
    - name: POSTGRES_PASSWORD
      value: "{{POSTGRES_PASSWORD}}"
    - name: POSTGRES_DB
      value: "oscar"
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /var/lib/postgresql/data
      name: postgres-data

  # 4b. oscar-db-migrate — runs `alembic upgrade head` on every pod start.
  #     Waits for postgres in the same pod to accept connections (psycopg
  #     retry loop), then applies any pending migrations and stays alive
  #     so the pod stays healthy. Schema additions go into the image's
  #     /app/migrations/versions/ via a new revision file; redeploying the
  #     pod is enough to roll them out.
  - name: oscar-db-migrate
    image: ghcr.io/mdopp/oscar-db-migrate:latest
    env:
    - name: POSTGRES_DSN
      value: "postgresql://oscar:{{POSTGRES_PASSWORD}}@localhost:5432/oscar"
    - name: OSCAR_COMPONENT
      value: "oscar-db-migrate"
    - name: TZ
      value: "{{TZ}}"

  # 5. pg-backup — weekly pg_dump sidecar + skills-local tar, 4-week retention.
  #    Simple loop: dump, prune, sleep a week. No external scheduler needed.
  - name: pg-backup
    image: docker.io/postgres:16-alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        export PGPASSWORD='{{POSTGRES_PASSWORD}}'
        # Wait for postgres to accept connections (first boot can take a minute).
        until pg_isready -h localhost -U oscar -d oscar -q; do sleep 5; done
        echo "pg-backup: postgres ready, entering weekly loop"
        while true; do
          NOW=$(date +%Y%m%d-%H%M%S)
          DUMP="/backups/oscar-$NOW.sql.gz"
          echo "pg-backup: writing $DUMP"
          if pg_dump -h localhost -U oscar oscar | gzip > "$DUMP"; then
            echo "pg-backup: dump ok ($(stat -c%s "$DUMP") bytes)"
          else
            echo "pg-backup: dump failed" >&2
            rm -f "$DUMP"
          fi
          # Tar the writable skills-local dir alongside the SQL dump. .git is
          # included on purpose — the local history is the rollback story.
          SKILLS_TAR="/backups/skills-local-$NOW.tar.gz"
          if tar -czf "$SKILLS_TAR" -C /skills-local . 2>/dev/null; then
            echo "pg-backup: skills tar ok ($(stat -c%s "$SKILLS_TAR") bytes)"
          else
            echo "pg-backup: skills tar failed (dir empty or absent)" >&2
            rm -f "$SKILLS_TAR"
          fi
          find /backups -name 'oscar-*.sql.gz' -mtime +28 -delete
          find /backups -name 'skills-local-*.tar.gz' -mtime +28 -delete
          sleep 604800
        done
    env:
    - name: OSCAR_COMPONENT
      value: "pg-backup"
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /backups
      name: postgres-backups
    - mountPath: /skills-local
      name: oscar-skills-local
      readOnly: true

  volumes:
  - name: hermes-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/hermes
      type: DirectoryOrCreate
  {{#OLLAMA_ENABLED}}
  - name: ollama-models
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/ollama
      type: DirectoryOrCreate
  {{/OLLAMA_ENABLED}}
  - name: qdrant-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/qdrant
      type: DirectoryOrCreate
  - name: postgres-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/postgres
      type: DirectoryOrCreate
  - name: postgres-backups
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/postgres-backups
      type: DirectoryOrCreate
  - name: signal-cli-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/signal-cli
      type: DirectoryOrCreate
  # Read-only mounts of the OSCAR registry checkout so HERMES picks up the
  # shared logging package and the skill code without rebuilding the image.
  # OSCAR_REGISTRY_DIR is where ServiceBay clones github.com/mdopp/oscar.git.
  - name: oscar-shared
    hostPath:
      path: {{OSCAR_REGISTRY_DIR}}/shared
      type: Directory
  - name: oscar-skills
    hostPath:
      path: {{OSCAR_REGISTRY_DIR}}/skills
      type: Directory
  # Writable overrides layer: user/reviewer edits live here. Survives pod
  # restarts; pg-backup tars it weekly into postgres-backups/. Owns its own
  # local git history (initialised by the skills-local-init container).
  - name: oscar-skills-local
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/skills-local
      type: DirectoryOrCreate
