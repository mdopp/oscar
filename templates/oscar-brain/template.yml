apiVersion: v1
kind: Pod
metadata:
  name: oscar-brain
  labels:
    app: oscar-brain
  annotations:
    servicebay.label: "OSCAR Brain (Postgres + Qdrant + Ollama — data plane for Hermes)"
    servicebay.schema-version: "2"
    servicebay.ports: "{{OLLAMA_PORT}}/tcp,{{QDRANT_PORT}}/tcp"
spec:
  containers:
  # 1. Postgres — OSCAR household-domain tables (system_settings + cloud_audit,
  #    plus future Phase-3 collections: books, records, documents, …).
  #    Hermes Agent (host-installed) reaches in via the published port for
  #    audit reads + future domain queries. Not for conversation history —
  #    Hermes uses its own SQLite for that.
  - name: postgres
    image: docker.io/postgres:16-alpine
    env:
    - name: POSTGRES_USER
      value: "oscar"
    - name: POSTGRES_PASSWORD
      value: "{{POSTGRES_PASSWORD}}"
    - name: POSTGRES_DB
      value: "oscar"
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 5432
      hostPort: {{POSTGRES_PORT}}
    volumeMounts:
    - mountPath: /var/lib/postgresql/data
      name: postgres-data

  # 1b. oscar-db-migrate — `alembic upgrade head` on every pod start.
  #     Waits for postgres, applies pending migrations, stays alive so the
  #     pod stays healthy. Schema additions go into the image's
  #     /app/migrations/versions/ as new revision files.
  - name: oscar-db-migrate
    image: ghcr.io/mdopp/oscar-db-migrate:latest
    env:
    - name: POSTGRES_DSN
      value: "postgresql://oscar:{{POSTGRES_PASSWORD}}@localhost:5432/oscar"
    - name: OSCAR_COMPONENT
      value: "oscar-db-migrate"
    - name: TZ
      value: "{{TZ}}"

  {{#OLLAMA_ENABLED}}
  # 2. Ollama — local LLM runtime for Hermes to point at. GPU passthrough is a
  #    separate toggle (`GPU_PASSTHROUGH`) so this same container can also run
  #    CPU-only. Pulls `{{HERMES_MODEL}}` (and optional `{{ROUTER_MODEL}}`) on
  #    first start. Omitted in cloud mode (OLLAMA_ENABLED="") — set Hermes to
  #    point at a cloud provider directly in that case.
  - name: ollama
    image: docker.io/ollama/ollama:latest
    env:
    - name: OLLAMA_HOST
      value: "0.0.0.0:11434"
    - name: OLLAMA_KEEP_ALIVE
      value: "24h"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "2"
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 11434
      hostPort: {{OLLAMA_PORT}}
    volumeMounts:
    - mountPath: /root/.ollama
      name: ollama-models
    {{#GPU_PASSTHROUGH}}
    resources:
      limits:
        nvidia.com/gpu: "1"
    {{/GPU_PASSTHROUGH}}
  {{/OLLAMA_ENABLED}}

  # 3. Qdrant — vector store for OSCAR household domain memory (Phase 3a+:
  #    semantic index over books / records / documents / experiences).
  #    Empty in Phase 0/1. Hermes has its own memory layer (Honcho); this
  #    is for OSCAR's household knowledge, not conversation context.
  - name: qdrant
    image: docker.io/qdrant/qdrant:latest
    env:
    - name: TZ
      value: "{{TZ}}"
    ports:
    - containerPort: 6333
      hostPort: {{QDRANT_PORT}}
    volumeMounts:
    - mountPath: /qdrant/storage
      name: qdrant-data

  # 4. pg-backup — weekly pg_dump sidecar, 4-week retention.
  #    Simple loop: dump, prune, sleep a week. No external scheduler needed.
  - name: pg-backup
    image: docker.io/postgres:16-alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        export PGPASSWORD='{{POSTGRES_PASSWORD}}'
        until pg_isready -h localhost -U oscar -d oscar -q; do sleep 5; done
        echo "pg-backup: postgres ready, entering weekly loop"
        while true; do
          NOW=$(date +%Y%m%d-%H%M%S)
          DUMP="/backups/oscar-$NOW.sql.gz"
          echo "pg-backup: writing $DUMP"
          if pg_dump -h localhost -U oscar oscar | gzip > "$DUMP"; then
            echo "pg-backup: dump ok ($(stat -c%s "$DUMP") bytes)"
          else
            echo "pg-backup: dump failed" >&2
            rm -f "$DUMP"
          fi
          find /backups -name 'oscar-*.sql.gz' -mtime +28 -delete
          sleep 604800
        done
    env:
    - name: OSCAR_COMPONENT
      value: "pg-backup"
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /backups
      name: postgres-backups

  volumes:
  {{#OLLAMA_ENABLED}}
  - name: ollama-models
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/ollama
      type: DirectoryOrCreate
  {{/OLLAMA_ENABLED}}
  - name: qdrant-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/qdrant
      type: DirectoryOrCreate
  - name: postgres-data
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/postgres
      type: DirectoryOrCreate
  - name: postgres-backups
    hostPath:
      path: {{DATA_DIR}}/oscar-brain/postgres-backups
      type: DirectoryOrCreate
